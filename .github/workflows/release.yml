name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --configuration Release --no-restore

      - name: Publish app
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD "artifacts/publish/win-x64"
          if (Test-Path $outputDir) {
            Remove-Item $outputDir -Recurse -Force
          }

          dotnet publish "src/GpxCut.App/GpxCut.App.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o $outputDir

      - name: Create installer layout
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/win-x64"
          if (!(Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }

          $layoutDir = Join-Path $PWD "artifacts/installer-layout/win-x64"
          if (Test-Path $layoutDir) {
            Remove-Item $layoutDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $layoutDir | Out-Null
          Copy-Item -Path (Join-Path $publishDir "*") -Destination $layoutDir -Recurse -Force

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --tool-path ./.tools wix --version 6.*
          Get-ChildItem ./.tools | Format-Table -AutoSize

      - name: Build MSI
        shell: pwsh
        run: |
          $layoutDir = Join-Path $PWD "artifacts/installer-layout/win-x64"
          if (!(Test-Path $layoutDir)) {
            throw "Installer layout not found: $layoutDir"
          }

          $outputDir = Join-Path $PWD "artifacts/installer/win-x64"
          if (!(Test-Path $outputDir)) {
            New-Item -ItemType Directory -Path $outputDir | Out-Null
          }

          $wixCandidates = @(
            (Join-Path $PWD ".tools/wix.exe"),
            (Join-Path $PWD ".tools/wix")
          )
          $wixExe = $wixCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $wixExe) {
            Write-Host "Contents of .tools:"
            Get-ChildItem (Join-Path $PWD ".tools") | Format-Table -AutoSize
            throw "WiX executable not found in .tools (checked wix.exe and wix)."
          }

          Write-Host "Using WiX CLI: $wixExe"
          & $wixExe --version

          $msiPath = Join-Path $outputDir "GpxCut-${{ steps.version.outputs.VERSION }}-win-x64.msi"
          & $wixExe build "installer/wix/GpxCut.Setup.wxs" `
            -arch x64 `
            -d PublishDir=$layoutDir `
            -d Version=${{ steps.version.outputs.VERSION }} `
            -out $msiPath

          if ($LASTEXITCODE -ne 0) {
            throw "WiX build failed with exit code $LASTEXITCODE"
          }

          if (!(Test-Path $msiPath)) {
            throw "MSI build completed without output file: $msiPath"
          }

          Write-Host "MSI created: $msiPath"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "GpxCut ${{ steps.version.outputs.VERSION }}"
          body: |
            ## GpxCut ${{ steps.version.outputs.VERSION }}

            ### Installation
            Download `GpxCut-${{ steps.version.outputs.VERSION }}-win-x64.msi` und ausführen.

            **Voraussetzungen:** Windows 10/11 x64, [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) (meist bereits installiert)
          files: |
            artifacts/installer/win-x64/GpxCut-${{ steps.version.outputs.VERSION }}-win-x64.msi
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
