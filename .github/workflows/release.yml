name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --configuration Release --no-restore

      - name: Publish app
        shell: pwsh
        run: |
          $outputDir = Join-Path $PWD "artifacts/publish/win-x64"
          if (Test-Path $outputDir) {
            Remove-Item $outputDir -Recurse -Force
          }

          dotnet publish "src/GpxCut.App/GpxCut.App.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o $outputDir

      - name: Create installer layout
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD "artifacts/publish/win-x64"
          if (!(Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }

          $layoutDir = Join-Path $PWD "artifacts/installer-layout/win-x64"
          if (Test-Path $layoutDir) {
            Remove-Item $layoutDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $layoutDir | Out-Null
          Copy-Item -Path (Join-Path $publishDir "*") -Destination $layoutDir -Recurse -Force

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --tool-path ./.tools wix

      - name: Build MSI
        shell: pwsh
        run: |
          $env:PATH = "$PWD/.tools;$env:PATH"
          ./installer/wix/build-msi.ps1 -Version "${{ steps.version.outputs.VERSION }}" -Runtime win-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GpxCut ${{ steps.version.outputs.VERSION }}"
          body: |
            ## GpxCut ${{ steps.version.outputs.VERSION }}

            ### Installation
            Download `GpxCut-${{ steps.version.outputs.VERSION }}-win-x64.msi` und ausführen.

            **Voraussetzungen:** Windows 10/11 x64, [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) (meist bereits installiert)
          files: |
            artifacts/installer/win-x64/GpxCut-${{ steps.version.outputs.VERSION }}-win-x64.msi
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
